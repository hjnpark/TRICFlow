# Logging config for geomeTRIC jobs invoked by TRICFlow.
# Writes output only to '<prefix>.log' (no terminal stream handler).
# Bundled with TRICFlow so we do not depend on a non-standard geomeTRIC file.

[loggers]
keys=root

[handlers]
keys=file_handler

[formatters]
keys=formatter

[logger_root]
level=INFO
handlers=file_handler

[handler_file_handler]
class=geometric.nifty.RawFileHandler
level=INFO
formatter=formatter
args=(r'%(logfilename)s',)

[formatter_formatter]
format=%(message)s
