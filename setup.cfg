[coverage:run]
omit =
    */tests/*
    tricflow/_version.py

[yapf]
COLUMN_LIMIT = 119
INDENT_WIDTH = 4
USE_TABS = False

[flake8]
max-line-length = 119

[tool:pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

[versioneer]
VCS = git
versionfile_source = tricflow/_version.py
versionfile_build = tricflow/_version.py
tag_prefix = ''
style = pep440